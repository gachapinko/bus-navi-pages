<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バスナビゲーター 🚌</title>
<link rel="apple-touch-icon" href="icon-bus.png">
<meta name="apple-mobile-web-app-title" content="バスナビ">
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Nunito:wght@400;600;700&display=swap');

  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #3b6ef8;
    --primary-light: #e8eeff;
    --success: #22c55e;
    --success-light: #dcfce7;
    --warn: #f59e0b;
    --warn-light: #fef3c7;
    --info: #3b82f6;
    --info-light: #dbeafe;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(59,110,248,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  /* background decoration */
  body::before {
    content: '';
    position: fixed; top: -80px; right: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, #c7d6ff 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    position: relative; z-index: 1;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 16px;
    color: var(--primary);
    letter-spacing: -0.5px;
  }

  /* Day type selector */
  .day-selector {
    display: flex;
    background: var(--card);
    border-radius: var(--radius);
    padding: 4px;
    gap: 4px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .day-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .day-btn.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 8px rgba(59,110,248,0.35);
  }

  /* Tab bar */
  .tabs {
    display: flex;
    background: var(--card);
    border-radius: var(--radius);
    padding: 4px;
    gap: 4px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 6px;
    border: none;
    border-radius: 10px;
    background: transparent;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .tab-btn.active {
    background: var(--primary-light);
    color: var(--primary);
  }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }

  .card-label {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
  }

  /* Time picker */
  .time-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .time-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .time-group label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
  }
  .time-group select {
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .time-group select:focus { border-color: var(--primary); }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
    box-shadow: 0 3px 12px rgba(59,110,248,0.30);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-outline {
    background: var(--bg);
    color: var(--text);
    border: 2px solid var(--border);
    font-size: 0.9rem;
  }
  .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
  }
  .btn-ghost:hover { color: var(--primary); }

  /* Result alerts */
  .alert {
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .alert-success { background: var(--success-light); color: #15803d; }
  .alert-warn { background: var(--warn-light); color: #92400e; }
  .alert-info { background: var(--info-light); color: #1d4ed8; }
  .alert .big { font-size: 1.3rem; }
  .alert .sub { font-size: 0.85rem; font-weight: 500; opacity: 0.8; margin-top: 2px; }

  .sub-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
    margin-top: 2px;
  }

  .nav-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .nav-row .btn { font-size: 1rem; padding: 10px; }
  .center-btn { display: flex; justify-content: center; margin-bottom: 10px; }
  .center-btn .btn { width: auto; padding: 8px 24px; }

  /* Link button */
  .btn-link {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: #e8f0fe;
    color: #1a73e8;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    margin-bottom: 8px;
    transition: background 0.2s;
  }
  .btn-link:hover { background: #d2e3fc; }

  .btn-copy {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: white;
    color: var(--text);
    border: 1.5px solid var(--border);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy:hover { background: var(--primary-light); border-color: var(--primary); }

  /* Timetable */
  .timetable-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  th {
    background: var(--primary);
    color: white;
    padding: 10px 8px;
    font-weight: 700;
    text-align: center;
  }
  td {
    padding: 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-family: 'Nunito', monospace;
    font-weight: 600;
    letter-spacing: 0.3px;
    line-height: 1.6;
  }
  td:first-child {
    font-weight: 800;
    color: var(--primary);
    background: var(--primary-light);
    min-width: 40px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8faff; }
  tr:hover td:first-child { background: var(--primary-light); }

  .subtab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .subtab-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: white;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
  }
  .subtab-btn.active {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
  }

  .copied-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e293b;
    color: white;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .copied-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .result-section { animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🚌 バスナビゲーター</h1>

  <!-- Day type -->
  <div class="day-selector">
    <button class="day-btn" data-day="平日" onclick="setDay('平日',this)">平日</button>
    <button class="day-btn" data-day="土曜" onclick="setDay('土曜',this)">土曜</button>
    <button class="day-btn" data-day="休日" onclick="setDay('休日',this)">休日</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="setTab(0,this)">🏠 ➡ 🏫 塾へ</button>
    <button class="tab-btn" onclick="setTab(1,this)">🏫 ➡ 🏠 帰り</button>
    <button class="tab-btn" onclick="setTab(2,this)">📋 時刻表</button>
  </div>

  <!-- Tab 0: 塾へ -->
  <div class="tab-panel active" id="panel-0">
    <div class="card">
      <div class="card-label">📍 塾に何時までに着きたい？</div>
      <div class="time-row">
        <div class="time-group"><label>時</label><select id="h1"></select></div>
        <div class="time-group"><label>分</label><select id="m1"></select></div>
      </div>
      <button class="btn btn-primary" onclick="calcGo()">出発時間を計算</button>
    </div>
    <div id="result-go"></div>
  </div>

  <!-- Tab 1: 帰り -->
  <div class="tab-panel" id="panel-1">
    <div class="card">
      <div class="card-label">📍 塾を何時に出る？</div>
      <div class="time-row">
        <div class="time-group"><label>時</label><select id="h2"></select></div>
        <div class="time-group"><label>分</label><select id="m2"></select></div>
      </div>
      <button class="btn btn-primary" onclick="calcBack()">帰りのバスを計算</button>
    </div>
    <div id="result-back"></div>
  </div>

  <!-- Tab 2: 時刻表 -->
  <div class="tab-panel" id="panel-2">
    <div class="subtab-row">
      <button class="subtab-btn active" onclick="setSubTab('go',this)">🏫 行き</button>
      <button class="subtab-btn" onclick="setSubTab('back',this)">🏠 帰り</button>
    </div>
    <div id="timetable-go" class="timetable-wrap"></div>
    <div id="timetable-back" class="timetable-wrap" style="display:none"></div>
  </div>
</div>

<div class="copied-toast" id="toast">📋 コピーしました！</div>

<script>
// ---- DATA ----
const BUS_DATA = {
  "平日": {
    "行き": {7:[10,23,36,49],8:[3,17,31,45,59],9:[14,29,44],10:[0,20,40,59],11:[19,39,59],12:[19,39,59],13:[19,39,59],14:[19,39,59],15:[19,39,54],16:[4,23,42,59],17:[16,33,50],18:[7,24,41,58],19:[15,33,52],20:[17,35,53],21:[25,45],22:[6,29]},
    "帰り": {7:[10,24,35,48],8:[3,18,33,48],9:[5,25,45],10:[5,25,45],11:[5,25,45],12:[5,25,45],13:[5,25,45],14:[5,25,45],15:[5,25,45],16:[3,20,37,54],17:[11,28,45],18:[2,19,36,53],19:[10,27,44],20:[2,21,40],21:[1,22,45],22:[5,26,46]}
  },
  "土曜": {
    "行き": {7:[6,28,44],8:[0,17,34,52],9:[11,30,49],10:[8,27,46],11:[5,24,43],12:[3,22,42],13:[2,22,41],14:[1,21,41],15:[0,20,41],16:[2,22,42],17:[3,24,44],18:[3,23,42],19:[2,22,42],20:[11,34,55],21:[23],22:[0]},
    "帰り": {7:[29,50],8:[6,23,40,58],9:[16,35,54],10:[13,32,51],11:[10,29,49],12:[8,28,47],13:[7,27,47],14:[6,26,46],15:[6,26,46],16:[7,28,48],17:[9,29,50],18:[10,29,48],19:[7,25,48],20:[11,34,55],21:[16,46],22:[16]}
  },
  "休日": {
    "行き": {7:[10,36],8:[7,24,42],9:[9,34,58],10:[13,28,50],11:[12,31,50],12:[10,30,49],13:[8,27,46],14:[5,24,43],15:[2,21,40,59],16:[18,37,56],17:[15,34,53],18:[14,36],19:[7,29,50],20:[19,56],21:[28],22:[0]},
    "帰り": {7:[27,57],8:[27,49],9:[11,35,59],10:[23,41,59],11:[17,37,57],12:[17,36,55],13:[14,33,52],14:[11,30,49],15:[8,27,46],16:[5,24,43],17:[2,21,41],18:[1,21,43],19:[6,29,51],20:[12,44],21:[16,46],22:[16]}
  }
};

const WALK_HOME_TO_STOP = 10;
const TOTAL_BUS_TO_SCHOOL = 30;

// ---- STATE ----
let currentDay = '平日';
let currentTab = 0;
let offGo = 0, offBack = 0;
let busGo = null, busBack = null;

// ---- INIT ----
function init() {
  // detect day
  const wd = new Date().getDay();
  const autoDay = wd === 0 ? '休日' : wd === 6 ? '土曜' : '平日';
  setDay(autoDay, document.querySelector(`[data-day="${autoDay}"]`));

  // populate hour selects
  const nowH = new Date().getHours();
  const clampH = Math.max(7, Math.min(22, nowH));
  ['h1','h2'].forEach(id => {
    const sel = document.getElementById(id);
    for (let h = 7; h <= 22; h++) {
      const o = document.createElement('option');
      o.value = h; o.textContent = h + ' 時';
      if (h === clampH) o.selected = true;
      sel.appendChild(o);
    }
  });
  ['m1','m2'].forEach(id => {
    const sel = document.getElementById(id);
    for (let m = 0; m < 60; m += 5) {
      const o = document.createElement('option');
      o.value = m; o.textContent = String(m).padStart(2,'0') + ' 分';
      sel.appendChild(o);
    }
  });

  buildTimetable('go');
  buildTimetable('back');
}

// ---- HELPERS ----
function setDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  // re-render results if visible
  if (busGo !== null) renderGoResult();
  if (busBack !== null) renderBackResult();
  buildTimetable('go');
  buildTimetable('back');
}

function setTab(idx, el) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function setSubTab(dir, el) {
  document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('timetable-go').style.display = dir==='go' ? '' : 'none';
  document.getElementById('timetable-back').style.display = dir==='back' ? '' : 'none';
}

function fmt(dt) {
  return String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
}

function addMin(dt, m) {
  return new Date(dt.getTime() + m * 60000);
}

function getAllBuses(direction) {
  const data = BUS_DATA[currentDay][direction];
  const today = new Date();
  const buses = [];
  for (const [h, mins] of Object.entries(data)) {
    for (const m of mins) {
      const d = new Date(today);
      d.setHours(Number(h), m, 0, 0);
      buses.push(d);
    }
  }
  buses.sort((a,b) => a-b);
  return buses;
}

function getOffsetBus(direction, targetH, targetM, isArrivalLimit, offset) {
  const today = new Date();
  const target = new Date(today);
  target.setHours(targetH, targetM, 0, 0);
  const deadline = isArrivalLimit ? new Date(target.getTime() - TOTAL_BUS_TO_SCHOOL * 60000) : target;

  const buses = getAllBuses(direction);
  let base = null;
  if (isArrivalLimit) {
    const suitable = buses.filter(b => b <= deadline);
    if (suitable.length) base = suitable[suitable.length - 1];
  } else {
    const suitable = buses.filter(b => b >= deadline);
    if (suitable.length) base = suitable[0];
  }
  if (!base) return null;

  const idx = buses.findIndex(b => b.getTime() === base.getTime());
  const targetIdx = idx + offset;
  if (targetIdx >= 0 && targetIdx < buses.length) return buses[targetIdx];
  return null;
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast();
  });
}

// ---- GO (塾へ) ----
function calcGo() {
  offGo = 0;
  const h = Number(document.getElementById('h1').value);
  const m = Number(document.getElementById('m1').value);
  busGo = getOffsetBus('行き', h, m, true, 0);
  renderGoResult();
}

function renderGoResult() {
  const h = Number(document.getElementById('h1').value);
  const m = Number(document.getElementById('m1').value);
  busGo = getOffsetBus('行き', h, m, true, offGo);
  const el = document.getElementById('result-go');
  if (!busGo) { el.innerHTML = '<div class="card" style="text-align:center;color:var(--muted)">該当するバスが見つかりませんでした</div>'; return; }

  const leaveT = fmt(addMin(busGo, -WALK_HOME_TO_STOP));
  const busT = fmt(busGo);
  const arrT = fmt(addMin(busGo, TOTAL_BUS_TO_SCHOOL));
  const offsetNote = offGo !== 0 ? `<div class="sub">${offGo < 0 ? '前のバス' : '次のバス'}を表示中</div>` : '';
  const copyStr = `${leaveT} 出発！\nバス: ${busT}`;

  el.innerHTML = `
    <div class="result-section">
      <div class="alert alert-success">🏠 出発時刻&nbsp;<span class="big">${leaveT}</span>${offsetNote}</div>
      <div class="alert alert-info">🚌 バス <strong>${busT}</strong> 発 &nbsp;|&nbsp; 🏫 到着 <strong>${arrT}</strong></div>
      <div class="nav-row">
        <button class="btn btn-outline" onclick="shiftGo(-1)">⬅️ 前のバス</button>
        <button class="btn btn-outline" onclick="shiftGo(1)">次のバス ➡️</button>
      </div>
      <div class="center-btn"><button class="btn btn-ghost" onclick="offGo=0;renderGoResult()">リセット</button></div>
      <a class="btn-link" href="https://tasks.google.com/" target="_blank">💙 Google Tasks を開く</a>
      <button class="btn-copy" onclick="copyText('${copyStr.replace(/\n/,'\\n')}')">📋 コピー</button>
    </div>`;
}

function shiftGo(d) { offGo += d; renderGoResult(); }

// ---- BACK (帰り) ----
function calcBack() {
  offBack = 0;
  const h = Number(document.getElementById('h2').value);
  const m = Number(document.getElementById('m2').value);
  busBack = getOffsetBus('帰り', h, m, false, 0);
  renderBackResult();
}

function renderBackResult() {
  const h = Number(document.getElementById('h2').value);
  const m = Number(document.getElementById('m2').value);
  busBack = getOffsetBus('帰り', h, m, false, offBack);
  const el = document.getElementById('result-back');
  if (!busBack) { el.innerHTML = '<div class="card" style="text-align:center;color:var(--muted)">該当するバスが見つかりませんでした</div>'; return; }

  const busT = fmt(busBack);
  const pickT = fmt(addMin(busBack, 15));
  const homeT = fmt(addMin(busBack, 25));
  const offsetNote = offBack !== 0 ? `<div class="sub">${offBack < 0 ? '前のバス' : '次のバス'}を表示中</div>` : '';
  const copyStr = `${busT} バス\\n${pickT} お迎え`;

  el.innerHTML = `
    <div class="result-section">
      <div class="alert alert-success">🚌 バス&nbsp;<span class="big">${busT}</span>${offsetNote}</div>
      <div class="alert alert-warn">🏃 お迎え <strong>${pickT}</strong></div>
      <div class="alert alert-info">🏠 帰宅 <strong>${homeT}</strong></div>
      <div class="nav-row">
        <button class="btn btn-outline" onclick="shiftBack(-1)">⬅️ 前のバス</button>
        <button class="btn btn-outline" onclick="shiftBack(1)">次のバス ➡️</button>
      </div>
      <div class="center-btn"><button class="btn btn-ghost" onclick="offBack=0;renderBackResult()">リセット</button></div>
      <a class="btn-link" href="https://tasks.google.com/" target="_blank">💙 Google Tasks を開く</a>
      <button class="btn-copy" onclick="copyText('${copyStr}')">📋 コピー</button>
    </div>`;
}

function shiftBack(d) { offBack += d; renderBackResult(); }

// ---- TIMETABLE ----
function buildTimetable(dir) {
  const direction = dir === 'go' ? '行き' : '帰り';
  const el = document.getElementById('timetable-' + dir);
  let html = '<table><thead><tr><th>時</th><th>平日</th><th>土曜</th><th>休日</th></tr></thead><tbody>';
  for (let h = 7; h <= 22; h++) {
    html += `<tr><td>${h}</td>`;
    ['平日','土曜','休日'].forEach(d => {
      const mins = (BUS_DATA[d][direction][h] || []).map(m => String(m).padStart(2,'0')).join('  ');
      html += `<td>${mins || '―'}</td>`;
    });
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

init();
</script>
</body>
</html>
